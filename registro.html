<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Estudiantes</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="contenedor">
    <h1>Registro de Estudiantes</h1>
    <div class="formulario">
      <h2>Agregar estudiante</h2> <label>Nombre</label> <input type="text" id="inputNombre"
        placeholder="Ingrese el nombre"> <label>Edad</label> <input type="number" id="inputEdad"
        placeholder="Ingrese la edad"> <label>Grado</label> <select id="selectGrado">
        <option value="">Seleccione</option>
        <option>Primero</option>
        <option>Segundo</option>
        <option>Tercero</option>
        <option>Cuarto</option>
        <option>Quinto</option>
      </select> <label>Estado</label> <select id="selectEstado">
        <option>Activo</option>
        <option>Inactivo</option>
      </select>
      <p id="mensajeError"></p>
      <div class="filaBotones"> <button id="btnAgregar"> Agregar </button> <button id="btnLimpiar"> Limpiar </button>
      </div>
    </div>
    <div class="filtros">
      <h2>Buscar y filtrar</h2> <label>Buscar por nombre</label> <input type="text" id="inputBuscar"
        placeholder="Buscar estudiante"> <label>Filtrar por grado</label> <select id="selectFiltroGrado">
        <option value="">Todos</option>
        <option>Primero</option>
        <option>Segundo</option>
        <option>Tercero</option>
        <option>Cuarto</option>
        <option>Quinto</option>
      </select> <label>Filtrar por estado</label> <select id="selectFiltroEstado">
        <option value="">Todos</option>
        <option>Activo</option>
        <option>Inactivo</option>
      </select>
      <div class="filaBotones"> <button id="btnFiltrar"> Filtrar </button> <button id="btnMostrarTodos"> Mostrar Todos
        </button> </div>
    </div>
    <div class="resultados">
      <h2>Lista de estudiantes</h2>
      <p id="contadorEstudiantes"> Total: 0 estudiante(s) </p>
      <div id="areaResultados"></div>
    </div>
  </div>
  <script src="registro.js"></script>
</body>

</html>
